<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
</head>

<body>

<table border="2"
       cellpadding="10"
       cellspacing="5"
       width="70%"
       height="300"
       align="center"
       bgcolor="lightyellow"
       bordercolor="blue"
       rules="all"
       frame="box">

    <caption><b>Student Information</b></caption>

    <thead bgcolor="lightblue">
        <tr>
            <th rowspan="2">Roll No</th>
            <th rowspan="2">Name</th>
            <th colspan="2">Marks</th>
            <th rowspan="2">Grade</th>
        </tr>

        <tr>
            <th>HTML</th>
            <th>CSS</th>
        </tr>
    </thead>

    <tbody align="center">

        <tr>
            <td>101</td>
            <td>Vaishnavi</td>
            <td>95</td>
            <td>92</td>
            <td>A+</td>
        </tr>

        <tr>
            <td>102</td>
            <td>Rahul</td>
            <td>88</td>
            <td>85</td>
            <td>A</td>
        </tr>

        <tr>
            <td>103</td>
            <td>Priya</td>
            <td>90</td>
            <td>94</td>
            <td>A+</td>
        </tr>

    </tbody>

    <tfoot bgcolor="lightgreen">
        <tr>
            <td colspan="5" align="center">
                Total Students : 3
            </td>
        </tr>
    </tfoot>

</table>

</body>
</html>
